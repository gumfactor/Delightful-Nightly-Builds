name: Nightly Build

on:
  workflow_dispatch:        # Manual trigger only — Routines is the primary scheduler
    inputs:
      debug_note:
        description: 'Optional note to pass to the build session'
        required: false
        default: ''

permissions:
  contents: write           # Required for Claude to commit and push
  id-token: write           # Required for claude-code-action OIDC authentication

jobs:
  nightly-build:
    runs-on: ubuntu-latest
    timeout-minutes: 90     # Generous limit; Claude will commit incrementally

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full history so Claude can read builds/index.md

      - name: Configure git identity
        run: |
          git config user.name "Claude Nightly Builder"
          git config user.email "noreply@anthropic.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python test tooling
        run: pip install pytest pytest-cov

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright and browsers
        run: |
          npm install -g @playwright/test
          npx playwright install chromium --with-deps

      - name: Run nightly build
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are running a scheduled nightly build session for the
            Delightful-Nightly-Builds repository.

            Your full operating instructions are in CLAUDE.md at the root of
            this repo. Read it now before doing anything else.

            Your task: follow the process in CLAUDE.md exactly — including
            Step 0 (check for incomplete builds), then build tonight's project,
            write and run tests, verify success criteria, document, and push.

            1. Read CLAUDE.md fully, then PROFILE.md, then builds/index.md.
            2. Step 0: check for any incomplete build from a prior session and resume if found.
            3. Decide what to build using the framework in CLAUDE.md.
            4. Create builds/YYYY-MM-DD/ (today's UTC date).
            5. Write PRD.md first (including Testing Strategy section) — then build.
            6. Write tests as you build. Run them: they must all pass.
            7. Verify success criteria, write documentation.
            8. Update builds/index.md.
            9. Commit and push. Stage only builds/YYYY-MM-DD/ and builds/index.md.

            Test commands available in this environment:
            - Python: python -m pytest tests/ -v
            - Playwright: npx playwright test
            - Vitest: npx vitest run
            - Jest: npx jest

            Constraints:
            - Do not modify any files outside builds/YYYY-MM-DD/ and builds/index.md.
            - If you cannot complete safely, follow the Abort Protocol in CLAUDE.md.
            - Do not ask for human input — make all decisions autonomously.
            - All tests must pass before committing.

            Begin now.

      - name: Check if build needs resumption
        id: check_incomplete
        run: |
          # Find the most recent dated build folder
          LATEST=$(ls builds/ | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}-' | sort | tail -1)
          if [ -z "$LATEST" ]; then
            echo "needs_resume=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          LOG="builds/$LATEST/BUILD_LOG.md"
          ABORTED="builds/$LATEST/ABORTED.md"
          if [ -f "$ABORTED" ]; then
            echo "needs_resume=false" >> $GITHUB_OUTPUT
          elif [ -f "$LOG" ] && grep -q "Build complete" "$LOG"; then
            echo "needs_resume=false" >> $GITHUB_OUTPUT
          else
            echo "needs_resume=true" >> $GITHUB_OUTPUT
            echo "incomplete_folder=$LATEST" >> $GITHUB_OUTPUT
          fi

      - name: Resume incomplete build if needed
        if: steps.check_incomplete.outputs.needs_resume == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            A previous build session was interrupted before completion.
            The incomplete build is in: builds/${{ steps.check_incomplete.outputs.incomplete_folder }}/

            Your task: resume and complete this interrupted build.

            1. Read CLAUDE.md for the full build process and standards.
            2. Read builds/${{ steps.check_incomplete.outputs.incomplete_folder }}/PRD.md to re-establish the spec.
            3. Read builds/${{ steps.check_incomplete.outputs.incomplete_folder }}/BUILD_LOG.md to identify the last completed phase.
            4. Add a resumption entry to BUILD_LOG.md: "[time UTC] Session resumed. Continuing from [phase]."
            5. Continue building from where the previous session stopped.
            6. Write and run all tests. They must pass before committing.
            7. Complete all documentation (FutureFeatures.md, Manual.md if needed).
            8. Add final BUILD_LOG.md entry: "Build complete. Success criteria reviewed. All tests passing."
            9. Update builds/index.md with the build's status.
            10. Commit and push — stage only the build folder and builds/index.md.

            Do not start a new build. Complete this one.

            Test commands available:
            - Python: python -m pytest tests/ -v
            - Playwright: npx playwright test
            - Vitest: npx vitest run
            - Jest: npx jest

      - name: Verify build was committed
        run: |
          git pull origin HEAD --ff-only 2>/dev/null || true
          echo "=== Latest 3 commits ==="
          git log --oneline -3
          echo ""
          echo "=== Latest build folder ==="
          LATEST=$(ls builds/ | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}-' | sort | tail -1)
          if [ -n "$LATEST" ]; then
            echo "Folder: builds/$LATEST"
            ls "builds/$LATEST/"
            echo ""
            echo "=== BUILD_LOG.md last 5 lines ==="
            tail -5 "builds/$LATEST/BUILD_LOG.md" 2>/dev/null || echo "(no BUILD_LOG.md)"
          else
            echo "No dated build folders found"
          fi
